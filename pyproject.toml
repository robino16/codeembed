[project]
name = "codeprism"
version = "0.1.0"
description = "Embeds your codebase and makes it available for quick LLM lookups via MCP."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "chromadb==1.5.8",
    "mcp==1.26.0",
    "ollama==0.6.1",
    "pydantic==2.13.3",
    "pytest==9.0.3",
]

[project.scripts]
codeprism = "codeprism.cli:app"

[tool.setuptools.packages.find]
where = ["src"]
